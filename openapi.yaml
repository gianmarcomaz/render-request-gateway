openapi: 3.1.0
info:
  title: Render Request Gateway
  version: 0.1.0
  description: HTTP API for queuing and listing Wayframe render requests.
servers:
  - url: https://render-request-gateway.gianmarcomazzella.workers.dev
    description: Live deployed Worker
  - url: http://localhost:8787
    description: Local Wrangler dev server
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Readiness check
      security: []
      responses:
        "200":
          description: Gateway is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ok
  /v1/renders:
    post:
      summary: Queue a render request
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 128
          description: Replays the original render_id for the same key within the same workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRenderRequest"
      responses:
        "202":
          description: Render request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRenderResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              description: Seconds until the current rate-limit window resets.
              schema:
                type: integer
                minimum: 1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: List recent render requests for the authenticated workspace
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Recent render requests
          content:
            application/json:
              schema:
                type: object
                required: [renders]
                properties:
                  renders:
                    type: array
                    items:
                      $ref: "#/components/schemas/Render"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    CreateRenderRequest:
      type: object
      additionalProperties: false
      required: [asset_id, preset]
      properties:
        asset_id:
          type: string
          minLength: 1
          maxLength: 128
        preset:
          type: string
          enum: ["1080p", "720p", "480p"]
    CreateRenderResponse:
      type: object
      required: [render_id, status]
      properties:
        render_id:
          type: string
          format: uuid
        status:
          type: string
          const: queued
    Render:
      type: object
      required: [render_id, asset_id, preset, created_at]
      properties:
        render_id:
          type: string
          format: uuid
        asset_id:
          type: string
        preset:
          type: string
          enum: ["1080p", "720p", "480p"]
        created_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing, malformed, or unknown API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PayloadTooLarge:
      description: Request body is too large
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnsupportedMediaType:
      description: Request body must be JSON
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
